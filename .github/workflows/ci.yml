name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Add wasm32 target
      run: rustup target add wasm32-unknown-unknown
    - name: Build contract
      run: cd contracts/subscription && cargo build --target wasm32-unknown-unknown --release

  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install dependencies
      run: cd backend && npm ci
    - name: Lint
      run: cd backend && npm run lint || true
    - name: Test
      run: cd backend && CONTRACT_ID=dummy SUBSCRIBER_SECRET_KEY=dummy ADMIN_SECRET_KEY=dummy MONGODB_URI=mongodb://localhost npm test || true

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: cd frontend && npm ci
    - name: Lint
      run: cd frontend && npm run lint
    - name: Build
      run: cd frontend && npm run build